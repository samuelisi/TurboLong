name = "turbolong-alerts"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "turbolong-alerts"
database_id = "<run `npm run db:create` and paste the ID here>"

[vars]
RESEND_FROM = "alerts@turbolong.com"
FRONTEND_ORIGIN = "https://app.turbolong.com"
# RESEND_API_KEY: set via `wrangler secret put RESEND_API_KEY`
# TELEGRAM_BOT_TOKEN: set via `wrangler secret put TELEGRAM_BOT_TOKEN`
